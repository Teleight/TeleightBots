name: Bump Version and Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.0, without v prefix)'
        required: true

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN }}

      - name: Update build.gradle.kts
        run: |
          sed -i 's/val versionId = "[^"]*"/val versionId = "${{ github.event.inputs.version }}"/' build.gradle.kts

      - name: Commit, tag and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add build.gradle.kts
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin master
          git push origin "v${{ github.event.inputs.version }}"

name: CI and Release Job

on:
  push:
    branches: [ master ]
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'oracle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle build
        run: |
          ./gradlew shadowJar
          ./gradlew javadoc

      - name: Upload to artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: lib
          path: |
            build/docs/javadoc/
            build/libs/TeleightBots-*.jar

  after-build:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'oracle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: lib

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/TeleightBots-*.jar
          draft: true
          tag_name: ${{env.GITHUB_REF_NAME}}
          token: ${{ secrets.T_GITHUB_TOKEN }}
          generate_release_notes: true

      - name: Deploy javadoc to its assigned branch
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: javadoc
          FOLDER: build/docs/javadoc
          GITHUB_TOKEN: ${{ secrets.T_GITHUB_TOKEN }}
          CLEAR_GLOBS_FILE: ".github/javadoc-publish-clear"


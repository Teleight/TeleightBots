name: EAS Build iOS

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all

  push:
    branches:
      - main
      - master
    paths:
      - 'fitness-app/**'

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fitness-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fitness-app/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build with EAS
        run: |
          PROFILE=${{ github.event.inputs.profile || 'preview' }}
          PLATFORM=${{ github.event.inputs.platform || 'ios' }}
          eas build --profile $PROFILE --platform $PLATFORM --non-interactive
